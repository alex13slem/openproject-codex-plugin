name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        working-directory: plugins/openproject
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: plugins/openproject
        run: bun run typecheck

      - name: Check shell syntax
        run: bash -n scripts/install.sh scripts/uninstall.sh

      - name: Validate JSON manifests
        run: |
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool plugins/openproject/.codex-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/openproject/.mcp.json >/dev/null
