name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        working-directory: plugins/openproject
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: plugins/openproject
        run: bun run typecheck

      - name: Test
        working-directory: plugins/openproject
        run: bun run test

      - name: Build distributable server
        working-directory: plugins/openproject
        run: bun run build

      - name: Check portable installer
        run: |
          bun scripts/install.ts --help
          bun scripts/uninstall.ts --help

      - name: Check PowerShell syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failures = 0
          foreach ($file in @("scripts/install.ps1", "scripts/uninstall.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file, [ref]$tokens, [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Write-Error
              $failures++
            }
          }
          if ($failures -gt 0) { exit 1 }

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n scripts/install.sh scripts/uninstall.sh

      - name: Validate JSON manifests
        run: |
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool plugins/openproject/.codex-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/openproject/.mcp.json >/dev/null
          python3 -m json.tool glama.json >/dev/null
          python3 -m json.tool server.json >/dev/null
