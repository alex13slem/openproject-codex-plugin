name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API tokens, private URLs, or customer data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure ...
        2. Ask Codex to ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Bun version, Codex version, and OpenProject version when known.
